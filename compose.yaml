services:
  api:
    build:
      context: ./server
    environment:
      APP_ENV: development
      LOG_LEVEL: INFO
      WEB_CONCURRENCY: "1"
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/lifecurriculum
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://localhost:8000/health/live')"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 5s
    security_opt:
      - no-new-privileges:true

  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: lifecurriculum
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./server/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lifecurriculum"]
      interval: 5s
      timeout: 3s
      retries: 10

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./infra/otel/collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4318:4318"

volumes:
  postgres-data:
